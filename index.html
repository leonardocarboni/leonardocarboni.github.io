<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Interesse Composto</title>
  <link rel="stylesheet" href="css/mio.css">
  <!-- CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css" integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">

  <!-- jQuery and JS bundle w/ Popper.js -->
  <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ho+j7jyWK8fNQe+A12Hb8AhRq26LrZ/JpcUGGOn+Y7RsweNrtN/tE3MoK7ZeZDyx" crossorigin="anonymous"></script>
</head>
<body>
<div>
  <h1 class="display-4" align="center">Calcolatore Interesse Composto</h1>
  <p class="lead" align="center">Questo sito ti permette di calcolare l'interesse composto</p>
</div>
  <table align="center">
    <tbody>
    <tr><h6>
      <td>Deposito inziale: </td>
      <td><input type="text" id="deposit"/> €</td>
    </h6></tr>
    <tr><h6>
      <td>Aggiunta mensile: </td>
      <td><input type="text" id="monthly_add"/> €</td>
    </h6></tr>
    <tr><h6>
      <td>Anni a crescere: </td>
      <td><input type="text" id="years"/></td>
    </h6></tr>
    <tr><h6>
      <td>Interesse: </td>
      <td><input type="text" id="interest"/> %</td>
    </h6></tr>
    <tr>
      <td><button id="btn" onclick="calculate()" class="btn btn-outline-primary">Calcola</button></td>
      <td><input type="text" id="result" readonly/> €</td>
    </tr>
    <tr>
      <td colspan="2">
        <div id="alertMissing" class="alert alert-warning alert-dismissible fade show" role="alert">
          <strong>Inserisci tutti i dati.</strong>
          <button type="button" class="close" data-dismiss="alert" aria-label="Close">
            <span aria-hidden="true">&times;</span>
          </button>
        </div>

    </tr>
    </tbody>
  </table>
  <script>

    function calculate() {
      const deposit = parseInt(document.getElementById("deposit").value);
      const monthly_add = parseInt(document.getElementById("monthly_add").value);
      const years = parseInt(document.getElementById("years").value);
      const interest = parseInt(document.getElementById("interest").value);
      const rate = interest / 100;
      if (deposit == "NaN"){
        document.getElementById("alertMissing").style.hidden = false;
      }
      const result = deposit * Math.pow((1 + rate), years) +
        (monthly_add * 12 * (Math.pow((1 + rate), years + 1) - (1 + rate)) / rate);
      document.getElementById("result").value = result.toFixed(2);
    }

  </script>
</body>
</html>
